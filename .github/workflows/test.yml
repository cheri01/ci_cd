name: Test

on:
  push:
    paths:
      - 'go/**/*.go'
      - '.github/workflows/test.yml'
      - 'go.mod'
      - 'go.sum'


  pull_request:
    paths:
      - 'go/**/*.go'
      - '.github/workflows/test.yml'
      - 'go.mod'
      - 'go.sum'


jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: false

      - run: go test ./...
